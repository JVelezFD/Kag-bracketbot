<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BracketBot — AI Tournament Setup</title>
  <style>
    /* ── Reset & base ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0D0D0F;
      --surface: #16161A;
      --border: #2A2A2F;
      --pink: #FF4FA3;
      --green: #A6FF3B;
      --text: #F0F0F0;
      --muted: #888;
      --radius: 10px;
      --chat-w: 420px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top bar ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .paw {
      font-size: 22px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--pink);
    }

    header span {
      font-size: 12px;
      color: var(--muted);
      margin-left: 4px;
    }

    .new-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: border-color 0.2s, color 0.2s;
    }

    .new-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Chat panel ── */
    .chat-panel {
      width: var(--chat-w);
      min-width: 300px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .msg.bot {
      background: var(--surface);
      border: 1px solid var(--border);
      align-self: flex-start;
    }

    .msg.user {
      background: #1e1e24;
      border: 1px solid #333;
      align-self: flex-end;
      color: #ddd;
    }

    .msg strong {
      color: var(--pink);
    }

    .typing {
      display: flex;
      gap: 5px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      align-self: flex-start;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.5;
      }

      40% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .chat-input-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 9px 16px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input-row input:focus {
      border-color: var(--pink);
    }

    .chat-input-row button {
      background: var(--pink);
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      color: #fff;
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .chat-input-row button:hover {
      opacity: 0.85;
    }

    .chat-input-row button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* ── Bracket panel ── */
    .bracket-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .bracket-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .bracket-header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
    }

    .bracket-header .dot.live {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .bracket-scroll {
      flex: 1;
      overflow: auto;
      padding: 30px 24px;
    }

    .bracket-empty {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      text-align: center;
    }

    .bracket-empty .icon {
      font-size: 48px;
      opacity: 0.3;
    }

    .bracket-empty p {
      font-size: 14px;
      max-width: 240px;
    }

    /* ── Bracket renderer ── */
    .bracket-wrap {
      display: flex;
      gap: 0;
      align-items: flex-start;
      min-width: max-content;
    }

    .bracket-round {
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
    }

    .round-label {
      font-size: 11px;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-align: center;
      padding: 0 12px 10px;
      font-weight: 600;
    }

    .round-matches {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .match-slot {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      position: relative;
    }

    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      width: 170px;
      margin: 0 12px;
      position: relative;
    }

    .match-card.complete {
      border-color: #2a4a1a;
    }

    .player-row {
      padding: 8px 12px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      min-height: 36px;
      cursor: default;
      transition: background 0.15s;
    }

    .player-row:last-child {
      border-bottom: none;
    }

    .player-row.winner {
      background: #1a2e0a;
      color: var(--green);
      font-weight: 600;
    }

    .player-row.loser {
      color: #555;
      text-decoration: line-through;
    }

    .player-row.tbd {
      color: #444;
      font-style: italic;
    }

    .player-row.bye {
      color: #333;
      font-style: italic;
    }

    .seed-badge {
      font-size: 10px;
      color: var(--muted);
      background: var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      flex-shrink: 0;
    }

    /* Connector lines between rounds */
    .connector {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      width: 24px;
      flex-shrink: 0;
    }

    /* ── Pool play layout ── */
    .pools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .pool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .pool-card-header {
      background: #1a1a1f;
      padding: 8px 14px;
      font-size: 12px;
      color: var(--green);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .pool-match {
      padding: 8px 14px;
      font-size: 13px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pool-match .vs {
      color: var(--muted);
      font-size: 11px;
      margin: 0 6px;
    }

    .pool-match .result {
      font-size: 12px;
      color: var(--green);
      font-weight: 600;
    }

    /* ── Section labels ── */
    .section-title {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Grand final ── */
    .grand-final-card {
      background: var(--surface);
      border: 1px solid var(--pink);
      border-radius: var(--radius);
      padding: 16px 20px;
      max-width: 280px;
      margin-top: 24px;
    }

    .grand-final-label {
      font-size: 11px;
      color: var(--pink);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    /* ── Champion banner ── */
    .champion-banner {
      background: linear-gradient(135deg, #1a2e0a, #0a1a0a);
      border: 1px solid var(--green);
      border-radius: var(--radius);
      padding: 20px 24px;
      text-align: center;
      margin-bottom: 24px;
    }

    .champion-banner .trophy {
      font-size: 32px;
    }

    .champion-banner h2 {
      color: var(--green);
      font-size: 20px;
      margin: 8px 0 4px;
    }

    .champion-banner p {
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Export button ── */
    .export-btn {
      background: none;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 24px;
      transition: background 0.2s;
    }

    .export-btn:hover {
      background: rgba(166, 255, 59, 0.08);
    }
  </style>
</head>

<body>

  <!-- ── Header ── -->
  <header>
    <span class="paw">🐾</span>
    <h1>BracketBot</h1>
    <span>AI Tournament Setup</span>
    <button class="new-btn" onclick="newTournament()">+ New Tournament</button>
  </header>

  <div class="main">

    <!-- ── Chat panel ── -->
    <div class="chat-panel">
      <div class="messages" id="messages"></div>
      <div class="chat-input-row">
        <input id="userInput" type="text" placeholder="Type your message…"
          onkeydown="if(event.key==='Enter') sendMessage()" autocomplete="off" />
        <button id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>

    <!-- ── Bracket panel ── -->
    <div class="bracket-panel">
      <div class="bracket-header">
        <div class="dot" id="statusDot"></div>
        <span id="statusLabel">Waiting for tournament setup…</span>
      </div>
      <div class="bracket-scroll" id="bracketArea">
        <div class="bracket-empty">
          <div class="icon">🏆</div>
          <p>Your bracket will appear here once you complete setup in the chat.</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    const SESSION_ID = 'session_' + Math.random().toString(36).slice(2);
    let currentBracket = null;

    // ── Boot: send greeting ────────────────────────────────────────────────
    window.addEventListener('load', () => {
      fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: '__init__', session_id: SESSION_ID }),
      })
        .then(r => r.json())
        .then(data => {
          appendMessage(data.response || "Hey there! 👋 I'm BracketBot. What's the name of your event?", 'bot');
        })
        .catch(() => {
          appendMessage("Hey there! 👋 I'm BracketBot. What's the name of your event?", 'bot');
        });
    });

    // ── Send message ───────────────────────────────────────────────────────
    function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      appendMessage(text, 'user');
      input.value = '';
      setInputEnabled(false);
      showTyping();

      fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: SESSION_ID }),
      })
        .then(r => r.json())
        .then(data => {
          removeTyping();
          appendMessage(data.response, 'bot');
          if (data.bracket) {
            currentBracket = data.bracket;
            renderBracket(data.bracket);
            updateStatus('live', data.bracket.event_name || 'Tournament');
          }
          setInputEnabled(true);
          document.getElementById('userInput').focus();
        })
        .catch(err => {
          removeTyping();
          appendMessage('Something went wrong. Please try again.', 'bot');
          setInputEnabled(true);
        });
    }

    // ── New tournament ─────────────────────────────────────────────────────
    function newTournament() {
      fetch('/new', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID }),
      })
        .then(r => r.json())
        .then(data => {
          document.getElementById('messages').innerHTML = '';
          currentBracket = null;
          document.getElementById('bracketArea').innerHTML = `
      <div class="bracket-empty">
        <div class="icon">🏆</div>
        <p>Your bracket will appear here once you complete setup in the chat.</p>
      </div>`;
          updateStatus('waiting', 'Waiting for tournament setup…');
          appendMessage(data.response, 'bot');
        });
    }

    // ── Chat UI helpers ────────────────────────────────────────────────────
    function appendMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = markdownLight(text);
      document.getElementById('messages').appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function markdownLight(text) {
      return text
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing'; div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      document.getElementById('messages').appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    function setInputEnabled(enabled) {
      document.getElementById('userInput').disabled = !enabled;
      document.getElementById('sendBtn').disabled = !enabled;
    }

    function updateStatus(state, label) {
      document.getElementById('statusDot').className = 'dot' + (state === 'live' ? ' live' : '');
      document.getElementById('statusLabel').textContent = label;
    }

    // ── Bracket renderer ───────────────────────────────────────────────────
    function renderBracket(bracket) {
      const area = document.getElementById('bracketArea');
      area.innerHTML = '';

      const fmt = (bracket.format || '').toLowerCase();

      // Champion banner
      const champion = findChampion(bracket);
      if (champion) {
        area.innerHTML += `
      <div class="champion-banner">
        <div class="trophy">🏆</div>
        <h2>${champion}</h2>
        <p>Tournament Champion</p>
      </div>`;
      }

      if (fmt.includes('pool')) {
        renderPoolPlay(area, bracket);
      } else if (fmt.includes('double') && !fmt.includes('pool')) {
        renderDoubleElim(area, bracket);
      } else if (fmt.includes('round robin')) {
        renderRoundRobin(area, bracket);
      } else {
        renderSingleElim(area, bracket.rounds || []);
      }

      // Export button
      area.innerHTML += `<button class="export-btn" onclick="exportBracket()">⬇ Export Bracket (JSON)</button>`;
    }

    // Single elimination
    function renderSingleElim(container, rounds) {
      const wrap = document.createElement('div');
      wrap.className = 'bracket-wrap';

      rounds.forEach(round => {
        const col = document.createElement('div');
        col.className = 'bracket-round';
        col.innerHTML = `<div class="round-label">${round.label || 'Round ' + round.round}</div>`;

        const matchesDiv = document.createElement('div');
        matchesDiv.className = 'round-matches';
        matchesDiv.style.display = 'flex';
        matchesDiv.style.flexDirection = 'column';
        matchesDiv.style.gap = '12px';
        matchesDiv.style.paddingTop = '8px';

        (round.matchups || []).forEach(match => {
          const slot = document.createElement('div');
          slot.className = 'match-slot';
          slot.innerHTML = buildMatchCard(match);
          matchesDiv.appendChild(slot);
        });

        col.appendChild(matchesDiv);
        wrap.appendChild(col);
      });

      if (container instanceof HTMLElement) {
        container.appendChild(wrap);
      } else {
        container.innerHTML += wrap.outerHTML;
      }
    }

    // Double elimination
    function renderDoubleElim(container, bracket) {
      const wLabel = document.createElement('p');
      wLabel.className = 'section-title'; wLabel.textContent = 'Winners Bracket';
      container.appendChild(wLabel);
      renderSingleElim(container, bracket.winners_bracket || []);

      const lLabel = document.createElement('p');
      lLabel.className = 'section-title';
      lLabel.style.marginTop = '32px';
      lLabel.textContent = 'Losers Bracket';
      container.appendChild(lLabel);
      renderSingleElim(container, bracket.losers_bracket || []);

      // Grand Final
      const gf = bracket.grand_final;
      if (gf) {
        const gfDiv = document.createElement('div');
        gfDiv.className = 'grand-final-card';
        gfDiv.innerHTML = `
      <div class="grand-final-label">🏆 Grand Final</div>
      ${buildMatchCard(gf)}`;
        container.appendChild(gfDiv);
      }
    }

    // Round robin
    function renderRoundRobin(container, bracket) {
      (bracket.rounds || []).forEach(round => {
        const title = document.createElement('p');
        title.className = 'section-title';
        title.textContent = round.label || 'Round ' + round.round;
        container.appendChild(title);

        const wrap = document.createElement('div');
        wrap.className = 'bracket-wrap';
        (round.matchups || []).forEach(match => {
          const slot = document.createElement('div');
          slot.className = 'match-slot';
          slot.innerHTML = buildMatchCard(match);
          wrap.appendChild(slot);
        });
        container.appendChild(wrap);
      });
    }

    // Pool play
    function renderPoolPlay(container, bracket) {
      const pTitle = document.createElement('p');
      pTitle.className = 'section-title'; pTitle.textContent = 'Pool Play';
      container.appendChild(pTitle);

      const grid = document.createElement('div');
      grid.className = 'pools-grid';

      (bracket.pools || []).forEach(pool => {
        const card = document.createElement('div');
        card.className = 'pool-card';
        let html = `<div class="pool-card-header">Pool ${pool.pool}</div>`;
        (pool.schedule || []).forEach(round => {
          (round.matchups || []).forEach(match => {
            html += `<div class="pool-match">
          <span>${match.player1}</span>
          <span class="vs">vs</span>
          <span>${match.player2}</span>
          ${match.winner ? `<span class="result">✓ ${match.winner}</span>` : ''}
        </div>`;
          });
        });
        card.innerHTML = html;
        grid.appendChild(card);
      });
      container.appendChild(grid);

      if (bracket.playoff) {
        const plTitle = document.createElement('p');
        plTitle.className = 'section-title';
        plTitle.style.marginTop = '24px';
        plTitle.textContent = 'Playoff Bracket';
        container.appendChild(plTitle);
        renderSingleElim(container, bracket.playoff.rounds || []);
      }
    }

    // Build a single match card HTML string
    function buildMatchCard(match) {
      const p1 = match.player1 || 'TBD';
      const p2 = match.player2 || 'TBD';
      const winner = match.winner;
      const complete = !!winner;

      function rowClass(player) {
        if (player === 'TBD') return 'tbd';
        if (player === 'BYE') return 'bye';
        if (!winner) return '';
        return player === winner ? 'winner' : 'loser';
      }

      return `
    <div class="match-card ${complete ? 'complete' : ''}">
      <div class="player-row ${rowClass(p1)}">${p1 === 'TBD' ? '<em>TBD</em>' : p1}</div>
      <div class="player-row ${rowClass(p2)}">${p2 === 'TBD' ? '<em>TBD</em>' : p2}</div>
    </div>`;
    }

    // Find overall champion across any bracket format
    function findChampion(bracket) {
      const fmt = (bracket.format || '').toLowerCase();
      if (fmt.includes('double') && bracket.grand_final) {
        return bracket.grand_final.winner || null;
      }
      const rounds = bracket.rounds || [];
      if (rounds.length) {
        const last = rounds[rounds.length - 1];
        if (last.matchups && last.matchups[0]) return last.matchups[0].winner || null;
      }
      return null;
    }

    // Export bracket as JSON download (bracket export skill)
    function exportBracket() {
      if (!currentBracket) return;
      const blob = new Blob([JSON.stringify(currentBracket, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (currentBracket.event_name || 'bracket').replace(/\s+/g, '_') + '.json';
      a.click();
    }
  </script>
</body>

</html>
